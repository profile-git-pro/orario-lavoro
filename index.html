============================ */

.row.buttons-row {

#calendar td {

}

/* ============================
   RIEPILOGO
============================ */

#riepilogo {

  background: rgba(0, 122, 77, 0.25);
  backdrop-filter: blur(10px);

/* ============================
   MODALE — VERSIONE UNIVERSALE
============================ */

#modalOverlay {

  background: rgba(0, 122, 77, 0.25);

#modal {

<script>
/* ============================================================
   FUNZIONI DI SUPPORTO
============================================================ */

function parseTimeToMinutes(t) {
  if (!t) return 0;
  const parts = t.split(":");
  if (parts.length !== 2) return 0;
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if (isNaN(h) || isNaN(m)) return 0;
  return h * 60 + m;
}

function diffMinutes(start, end) {
  if (!start || !end) return 0;
  const s = parseTimeToMinutes(start);
  const e = parseTimeToMinutes(end);
  if (e <= s) return 0;
  return e - s;
}

/* ============================================================
   CALCOLO ORE GIORNALIERE
============================================================ */

function calcolaTotaliGiorno(dati) {
  if (!dati) {
    return { lavoro: 0, permesso: 0, missione: 0, totale: 0 };
  }

  const lavoro = diffMinutes(dati.ingressoLavoro, dati.uscitaLavoro);

  let permesso = 0;
  if (dati.uscitaPermesso && dati.ingressoPermesso) {
    permesso = diffMinutes(dati.uscitaPermesso, dati.ingressoPermesso);
  }

  let missione = 0;
  if (dati.uscitaMissione && dati.ingressoMissione) {
    missione = diffMinutes(dati.uscitaMissione, dati.ingressoMissione);
  }

  let totale = lavoro - permesso;
  if (totale < 0) totale = 0;

  return { lavoro, permesso, missione, totale };
}

/* ============================================================
   BADGE ORE
============================================================ */

function generaBadgeOre(datiG) {
  if (!datiG || !datiG.totale) return "";
  const dec = (datiG.totale / 60).toFixed(2);
  return `<div class="day-badge">${dec} h</div>`;
}

/* ============================================================
   TOOLTIP GIORNO
============================================================ */

function generaTooltip(datiG) {
  if (!datiG) return "";

  return `
    <div class="tooltip">
      Lavoro: ${formatMinutesToHM(datiG.lavoro)}<br>
      Permesso: -${formatMinutesToHM(datiG.permesso)}<br>
      Missione: ${formatMinutesToHM(datiG.missione)}<br>
      <strong>Totale: ${formatMinutesToHM(datiG.totale)}</strong>
    </div>
  `;
}

function formatMinutesToHM(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}h ${m}m`;
}

function formatMinutesToDecimal(min) {
  return (min / 60).toFixed(2);
}

/* ============================================================
   ICONA GIORNO CON DATI
============================================================ */

function creaIconaGiorno(tot) {
  if (!tot || !tot.totale || tot.totale === 0) return "";
  return `<span class="day-icon">✓</span>`;
}

/* ============================================================
   BARRA GRAFICA ORE
============================================================ */

function creaBarraOre(tot) {
  if (!tot || !tot.totale || tot.totale === 0) return "";
  const percent = Math.min(100, (tot.totale / 480) * 100);
  return `<div class="day-bar" style="width:${percent}%"></div>`;
}

/* ============================================================
   GIORNO INCOMPLETO
============================================================ */

function isGiornoIncompleto(dati) {
  if (!dati) return false;
  const inL = dati.ingressoLavoro;
  const outL = dati.uscitaLavoro;
  if ((inL && !outL) || (!inL && outL)) return true;
  return false;
}

/* ============================================================
   CALCOLO RIEPILOGO MENSILE
============================================================ */

function calcolaRiepilogoMensile(datiMese, giorniTotali) {
  let totLav = 0;
  let totPerm = 0;
  let totMis = 0;
  let tot = 0;
  let giorniConPresenza = 0;

  for (const g in datiMese) {
    const d = datiMese[g];
    const t = calcolaTotaliGiorno(d);

    totLav += t.lavoro;
    totPerm += t.permesso;
    totMis += t.missione;
    tot += t.totale;

    if (t.totale > 0) giorniConPresenza++;
  }

  const media = giorniConPresenza > 0 ? (tot / 60) / giorniConPresenza : 0;
  const presenza = giorniTotali > 0 ? (giorniConPresenza / giorniTotali) * 100 : 0;

  return {
    lavoro: totLav,
    permesso: totPerm,
    missione: totMis,
    totale: tot,
    media,
    presenza
  };
}

/* ============================================================
   APPLICA A TUTTA LA SETTIMANA
============================================================ */

function applicaSettimana(datiOrario, anno, mese, giorno, datiGiorno) {
  const festivi = getFestivi(anno);

  const date = new Date(anno, mese, giorno);
  const dayOfWeek = date.getDay();

  const offset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const lunedi = giorno - offset;

  for (let i = 0; i < 7; i++) {
    const g = lunedi + i;
    if (g < 1) continue;

    const dataCorrente = new Date(anno, mese, g);
    const weekday = dataCorrente.getDay();

    const keyData = `${anno}-${String(mese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;

    if (weekday === 0 || weekday === 6) continue;
    if (festivi[keyData]) continue;

    if (!datiOrario[anno]) datiOrario[anno] = {};
    if (!datiOrario[anno][mese]) datiOrario[anno][mese] = {};

    datiOrario[anno][mese][g] = {
      ...datiGiorno,
      note: datiOrario[anno][mese][g]?.note || ""
    };
  }
}

/* ============================================================
   COPIA DAL GIORNO PRECEDENTE
============================================================ */

function copiaDalGiornoPrecedente(datiOrario, anno, mese, giorno) {
  const prev = giorno - 1;
  if (prev < 1) return null;

  const d = datiOrario[anno]?.[mese]?.[prev];
  if (!d) return null;

  return {
    ingressoLavoro: d.ingressoLavoro || "",
    uscitaLavoro: d.uscitaLavoro || "",
    uscitaPermesso: "",
    ingressoPermesso: "",
    uscitaMissione: "",
    ingressoMissione: "",
    noteGiorno: ""
  };
}

/* ============================================================
   VARIABILI GLOBALI
============================================================ */

let datiOrario = {};
const STORAGE_KEY = "orarioLavoroCalendario";

let giornoCorrente = null;

let annoIniziale, meseIniziale;
let limiteIndietroAnno, limiteIndietroMese;
let ultimoAnnoConsentito;

/* ============================================================
   CARICAMENTO E SALVATAGGIO
============================================================ */

function caricaDati() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { datiOrario = JSON.parse(raw); }
    catch { datiOrario = {}; }
  }
}

function salvaDati() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(datiOrario));
}

/* ============================================================
   FESTIVI
============================================================ */

function getFestivi(anno) {
  const festivi = {
    [`${anno}-01-01`]: "Capodanno",
    [`${anno}-01-06`]: "Epifania",
    [`${anno}-04-25`]: "Liberazione",
    [`${anno}-05-01`]: "Lavoro",
    [`${anno}-06-02`]: "Repubblica",
    [`${anno}-08-15`]: "Ferragosto",
    [`${anno}-11-01`]: "Ognissanti",
    [`${anno}-12-08`]: "Immacolata",
    [`${anno}-12-25`]: "Natale",
    [`${anno}-12-26`]: "Santo Stefano",
    [`${anno}-12-24`]: "Prefestivo",
    [`${anno}-12-31`]: "Prefestivo"
  };

  const f = Math.floor,
        G = anno % 19,
        C = f(anno / 100),
        H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
        I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
        J = (anno + f(anno / 4) + I + 2 - C + f(C / 4)) % 7,
        L = I - J,
        mese = 3 + f((L + 40) / 44),
        giorno = L + 28 - 31 * f(mese / 4);

  const pasqua = `${anno}-${String(mese).padStart(2,"0")}-${String(giorno).padStart(2,"0")}`;
  festivi[pasqua] = "Pasqua";

  const d = new Date(anno, mese - 1, giorno + 1);
  const pasquetta = `${anno}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  festivi[pasquetta] = "Pasquetta";

  return festivi;
}

/* ============================================================
   AVVIO
============================================================ */

window.addEventListener("DOMContentLoaded", () => {
  caricaDati();

  const oggi = new Date();

  meseIniziale = oggi.getMonth() - 1;
  annoIniziale = oggi.getFullYear();
  if (meseIniziale < 0) {
    meseIniziale = 11;
    annoIniziale--;
  }

  const dataLimite = new Date(annoIniziale, meseIniziale, 1);
  dataLimite.setMonth(dataLimite.getMonth() - 3);
  limiteIndietroAnno = dataLimite.getFullYear();
  limiteIndietroMese = dataLimite.getMonth();

  ultimoAnnoConsentito = annoIniziale + 10;

  popolaAnni(annoIniziale);

  document.getElementById("anno").value = annoIniziale;
  document.getElementById("mese").value = meseIniziale;

  generaCalendario();

  document.getElementById("anno").addEventListener("change", generaCalendario);
  document.getElementById("mese").addEventListener("change", generaCalendario);

  document.getElementById("todayBtn").addEventListener("click", () => {
    const o = new Date();
    document.getElementById("anno").value = o.getFullYear();
    document.getElementById("mese").value = o.getMonth();
    generaCalendario();
  });

  document.getElementById("prevMonth").addEventListener("click", () => {
    let mese = parseInt(document.getElementById("mese").value);
    let anno = parseInt(document.getElementById("anno").value);

    if (anno < limiteIndietroAnno) return;
    if (anno === limiteIndietroAnno && mese <= limiteIndietroMese) return;

    mese--;
    if (mese < 0) { mese = 11; anno--; }

    document.getElementById("mese").value = mese;
    document.getElementById("anno").value = anno;
    generaCalendario();
  });

  document.getElementById("nextMonth").addEventListener("click", () => {
    let mese = parseInt(document.getElementById("mese").value);
    let anno = parseInt(document.getElementById("anno").value);

    if (anno > ultimoAnnoConsentito) return;
    if (anno === ultimoAnnoConsentito && mese >= 11) return;

    mese++;
    if (mese > 11) { mese = 0; anno++; }

    document.getElementById("mese").value = mese;
    document.getElementById("anno").value = anno;
    generaCalendario();
  });

  document.getElementById("resetPage").addEventListener("click", () => {
    document.getElementById("anno").value = annoIniziale;
    document.getElementById("mese").value = meseIniziale;
    generaCalendario();
  });

  document.getElementById("chiudiModal").addEventListener("click", chiudiModal);
  document.getElementById("salvaGiorno").addEventListener("click", salvaGiornoCorrente);
  document.getElementById("cancellaGiorno").addEventListener("click", cancellaGiornoCorrente);
  document.getElementById("copiaGiornoPrec").addEventListener("click", copiaGiornoPrec);
  document.getElementById("applicaSettimana").addEventListener("click", applicaSettimanaCorrente);

  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") chiudiModal();
  });

  [
    "ingressoLavoro","uscitaLavoro",
    "uscitaPermesso","ingressoPermesso",
    "uscitaMissione","ingressoMissione"
  ].forEach(id => {
    document.getElementById(id).addEventListener("change", aggiornaTotaleGiornoModal);
  });

  document.getElementById("exportExcel").addEventListener("click", esportaExcel);

  document.getElementById("clearAll").addEventListener("click", () => {
    if (confirm("Cancellare TUTTI i dati salvati?")) {
      localStorage.removeItem(STORAGE_KEY);
      datiOrario = {};
      generaCalendario();
    }
  });

  document.getElementById("resetPage").addEventListener("click", pulisciErroriInput);
  document.getElementById("prevMonth").addEventListener("click", pulisciErroriInput);
  document.getElementById("nextMonth").addEventListener("click", pulisciErroriInput);
  document.getElementById("todayBtn").addEventListener("click", pulisciErroriInput);
  document.getElementById("clearAll").addEventListener("click", pulisciErroriInput);

});

/* ============================================================
   POPOLA ANNI
============================================================ */

function popolaAnni(base) {
  const sel = document.getElementById("anno");
  sel.innerHTML = "";
  for (let a = base - 1; a <= base + 10; a++) {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    sel.appendChild(opt);
  }
}

/* ============================================================
   GENERA CALENDARIO
============================================================ */

function generaCalendario() {
  const anno = parseInt(document.getElementById("anno").value);
  const mese = parseInt(document.getElementById("mese").value);

  const titolo = document.getElementById("titoloMese");
  const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  titolo.textContent = `${mesi[mese]} ${anno}`;

  const tbody = document.getElementById("calendarBody");
  tbody.innerHTML = "";

  const festivi = getFestivi(anno);

  const first = new Date(anno, mese, 1);
  const last = new Date(anno, mese + 1, 0);
  const numGiorni = last.getDate();

  let start = first.getDay();
  if (start === 0) start = 6;
  else start--;

  let current = 1;
  const totalCells = Math.ceil((start + numGiorni) / 7) * 7;

  const oggi = new Date();

  for (let i = 0; i < totalCells; i++) {
    if (i % 7 === 0) {
      var row = document.createElement("tr");
      tbody.appendChild(row);
    }

    const cell = document.createElement("td");

    if (i < start || current > numGiorni) {
      cell.classList.add("empty");
      cell.textContent = "";
    } else {
      const g = current;
      cell.textContent = g;

      const keyAnno = String(anno);
      const keyMese = String(mese);
      const datiG = datiOrario[keyAnno]?.[keyMese]?.[g] || null;

      const tot = calcolaTotaliGiorno(datiG);

      const dataObj = new Date(anno, mese, g);
      const weekday = dataObj.getDay();
      const keyData = `${anno}-${String(mese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;

      if (
        anno === oggi.getFullYear() &&
        mese === oggi.getMonth() &&
        g === oggi.getDate()
      ) {
        cell.classList.add("today");
      }

            if (festivi[keyData]) {
        if (festivi[keyData] === "Prefestivo") cell.classList.add("prefestivo");
        else cell.classList.add("holiday");
      }

      if (weekday === 6) cell.classList.add("saturday");
      if (weekday === 0) cell.classList.add("sunday");

      cell.innerHTML += creaIconaGiorno(tot);
      cell.innerHTML += creaBarraOre(tot);

      const tooltip = generaTooltip(tot);
      if (tooltip) cell.innerHTML += tooltip;

      if (tot.totale > 0) {
        const totHM = formatMinutesToHM(tot.totale);
        cell.innerHTML += `<div class="day-total">${totHM}</div>`;
        cell.classList.add("day-filled");

        const ore = tot.totale / 60;
        if (ore <= 2) cell.dataset.ore = "low";
        else if (ore <= 6) cell.dataset.ore = "mid";
        else if (ore <= 8) cell.dataset.ore = "high";
        else cell.dataset.ore = "full";

        cell.innerHTML += generaBadgeOre(tot);
      }

      if (isGiornoIncompleto(datiG)) {
        cell.classList.add("day-incomplete");
      }

      cell.addEventListener("click", () => {
        apriModal(anno, mese, g);
      });

      current++;
    }

    row.appendChild(cell);
  }

  aggiornaRiepilogoMensile();
  document.getElementById("calendar").classList.add("visible");
}

/* ============================================================
   MODALE
============================================================ */

function apriModal(anno, mese, giorno) {
  giornoCorrente = { anno, mese, giorno };

  const d = datiOrario[anno]?.[mese]?.[giorno] || {};

  document.getElementById("ingressoLavoro").value = d.ingressoLavoro || "";
  document.getElementById("uscitaLavoro").value = d.uscitaLavoro || "";

  document.getElementById("uscitaPermesso").value = d.uscitaPermesso || "";
  document.getElementById("ingressoPermesso").value = d.ingressoPermesso || "";

  document.getElementById("uscitaMissione").value = d.uscitaMissione || "";
  document.getElementById("ingressoMissione").value = d.ingressoMissione || "";

  document.getElementById("noteGiorno").value = d.note || "";

  aggiornaTotaleGiornoModal();

  document.getElementById("modalOverlay").classList.add("visible");
  document.getElementById("modal").classList.add("visible");
}

function chiudiModal() {
  document.getElementById("modalOverlay").classList.remove("visible");
  document.getElementById("modal").classList.remove("visible");
}

/* ============================================================
   TOTALE GIORNO (MODALE)
============================================================ */

function aggiornaTotaleGiornoModal() {
  const dati = {
    ingressoLavoro: document.getElementById("ingressoLavoro").value,
    uscitaLavoro: document.getElementById("uscitaLavoro").value,
    uscitaPermesso: document.getElementById("uscitaPermesso").value,
    ingressoPermesso: document.getElementById("ingressoPermesso").value,
    uscitaMissione: document.getElementById("uscitaMissione").value,
    ingressoMissione: document.getElementById("ingressoMissione").value
  };

  const tot = calcolaTotaliGiorno(dati);

  const hm = formatMinutesToHM(tot.totale);
  const dec = formatMinutesToDecimal(tot.totale);
  document.getElementById("totaleGiornoLabel").textContent = `${hm} — ${dec} ore`;
}

/* ============================================================
   SALVA GIORNO
============================================================ */

function salvaGiornoCorrente() {
  if (!giornoCorrente) return;

  const { anno, mese, giorno } = giornoCorrente;

  if (!datiOrario[anno]) datiOrario[anno] = {};
  if (!datiOrario[anno][mese]) datiOrario[anno][mese] = {};

  const d = {
    ingressoLavoro: document.getElementById("ingressoLavoro").value,
    uscitaLavoro: document.getElementById("uscitaLavoro").value,
    uscitaPermesso: document.getElementById("uscitaPermesso").value,
    ingressoPermesso: document.getElementById("ingressoPermesso").value,
    uscitaMissione: document.getElementById("uscitaMissione").value,
    ingressoMissione: document.getElementById("ingressoMissione").value,
    note: document.getElementById("noteGiorno").value
  };

  const t = calcolaTotaliGiorno(d);
  d.minLavoro = t.lavoro;
  d.minPermesso = t.permesso;
  d.minMissione = t.missione;
  d.totaleMinuti = t.totale;

  datiOrario[anno][mese][giorno] = d;

  salvaDati();
  chiudiModal();
  generaCalendario();
}

/* ============================================================
   CANCELLA GIORNO
============================================================ */

function cancellaGiornoCorrente() {
  if (!giornoCorrente) return;

  const { anno, mese, giorno } = giornoCorrente;

  if (confirm("Cancellare tutti i dati di questo giorno?")) {
    if (datiOrario[anno]?.[mese]?.[giorno]) {
      delete datiOrario[anno][mese][giorno];
      salvaDati();
    }
    chiudiModal();
    generaCalendario();
  }
}

/* ============================================================
   COPIA DAL GIORNO PRECEDENTE
============================================================ */

function copiaGiornoPrec() {
  if (!giornoCorrente) return;

  const { anno, mese, giorno } = giornoCorrente;

  const d = copiaDalGiornoPrecedente(datiOrario, anno, mese, giorno);
  if (!d) {
    alert("Nessun giorno precedente disponibile.");
    return;
  }

  document.getElementById("ingressoLavoro").value = d.ingressoLavoro;
  document.getElementById("uscitaLavoro").value = d.uscitaLavoro;

  aggiornaTotaleGiornoModal();
  salvaGiornoCorrente();
}

/* ============================================================
   APPLICA A TUTTA LA SETTIMANA
============================================================ */

function applicaSettimanaCorrente() {
  if (!giornoCorrente) return;

  const { anno, mese, giorno } = giornoCorrente;

  const d = {
    ingressoLavoro: document.getElementById("ingressoLavoro").value,
    uscitaLavoro: document.getElementById("uscitaLavoro").value,
    uscitaPermesso: document.getElementById("uscitaPermesso").value,
    ingressoPermesso: document.getElementById("ingressoPermesso").value,
    uscitaMissione: document.getElementById("uscitaMissione").value,
    ingressoMissione: document.getElementById("ingressoMissione").value,
    note: document.getElementById("noteGiorno").value
  };

  const t = calcolaTotaliGiorno(d);
  d.minLavoro = t.lavoro;
  d.minPermesso = t.permesso;
  d.minMissione = t.missione;
  d.totaleMinuti = t.totale;

  applicaSettimana(datiOrario, anno, mese, giorno, d);

  salvaDati();
  chiudiModal();
  generaCalendario();
}

/* ============================================================
   RIEPILOGO MENSILE (UI)
============================================================ */

function aggiornaRiepilogoMensile() {
  const anno = document.getElementById("anno").value;
  const mese = document.getElementById("mese").value;

  const last = new Date(anno, parseInt(mese) + 1, 0);
  const giorniTotali = last.getDate();

  const datiMese = datiOrario[anno]?.[mese] || {};

  const r = calcolaRiepilogoMensile(datiMese, giorniTotali);

  document.getElementById("totLavoroH").textContent = Math.floor(r.lavoro / 60);
  document.getElementById("totLavoroM").textContent = r.lavoro % 60;
  document.getElementById("totLavoroDec").textContent = formatMinutesToDecimal(r.lavoro);

  document.getElementById("totPermessoH").textContent = Math.floor(r.permesso / 60);
  document.getElementById("totPermessoM").textContent = r.permesso % 60;
  document.getElementById("totPermessoDec").textContent = formatMinutesToDecimal(r.permesso);

  document.getElementById("totMissioneH").textContent = Math.floor(r.missione / 60);
  document.getElementById("totMissioneM").textContent = r.missione % 60;
  document.getElementById("totMissioneDec").textContent = formatMinutesToDecimal(r.missione);

  document.getElementById("totaleH").textContent = Math.floor(r.totale / 60);
  document.getElementById("totaleM").textContent = r.totale % 60;
  document.getElementById("totaleDec").textContent = formatMinutesToDecimal(r.totale);
}

/* ============================================================
   FIX PER PWA iPHONE — MODALE SCORRIBILE
============================================================ */

function isPWA() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

function aggiornaAltezzaModalePWA() {
  if (!isPWA()) return;

  const modal = document.getElementById("modal");
  if (!modal) return;

  // Altezza reale della finestra, corretta anche con tastiera aperta
  const h = window.innerHeight;
  modal.style.height = h + "px";
  modal.style.maxHeight = h + "px";
}

// Aggiorna quando la modale si apre
document.getElementById("modalOverlay").addEventListener("transitionend", aggiornaAltezzaModalePWA);

// Aggiorna quando cambia la viewport (tastiera, rotazione, ecc.)
window.addEventListener("resize", aggiornaAltezzaModalePWA);
window.addEventListener("orientationchange", aggiornaAltezzaModalePWA);

/* ============================================================
   ESPORTA EXCEL
============================================================ */

function esportaExcel() {
  const nome = document.getElementById("nome").value.trim();
  const cognome = document.getElementById("cognome").value.trim();
  const tooltip = document.getElementById("exportTooltip");

  document.getElementById("nome").classList.remove("input-error");
  document.getElementById("cognome").classList.remove("input-error");
  tooltip.style.display = "none";

  if (!nome || !cognome) {
    if (!nome) document.getElementById("nome").classList.add("input-error");
    if (!cognome) document.getElementById("cognome").classList.add("input-error");

    tooltip.style.display = "block";

    setTimeout(() => { tooltip.style.display = "none"; }, 2500);

    return;
  }

  tooltip.style.display = "none";

  const anno = parseInt(document.getElementById("anno").value);
  const mese = parseInt(document.getElementById("mese").value);

  const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const nomeFile = `Orario_${mesi[mese]}${anno}_${cognome}_${nome}.xlsx`;

  const rows = [
    ["Data", "Ingresso Lavoro", "Uscita Lavoro", "Uscita Permesso", "Ingresso Permesso", "Uscita Missione", "Ingresso Missione", "Note", "Totale (h:m)", "Totale (decimale)"]
  ];

  const last = new Date(anno, mese + 1, 0);
  const numGiorni = last.getDate();

  let totaleDecimali = 0;

  for (let g = 1; g <= numGiorni; g++) {
    const d = datiOrario[anno]?.[mese]?.[g] || {};
    const tot = d.totaleMinuti || 0;
    const dec = parseFloat(formatMinutesToDecimal(tot));

    totaleDecimali += dec;

    rows.push([
      `${String(g).padStart(2,"0")}/${String(mese+1).padStart(2,"0")}/${anno}`,
      d.ingressoLavoro || "",
      d.uscitaLavoro || "",
      d.uscitaPermesso || "",
      d.ingressoPermesso || "",
      d.uscitaMissione || "",
      d.ingressoMissione || "",
      d.note || "",
      formatMinutesToHM(tot),
      dec.toFixed(2)
    ]);
  }

  rows.push(["TOTALE","","","","","","","","", totaleDecimali.toFixed(2)]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  Object.keys(ws).forEach(key => {
    if (key[0] === '!') return;
    if (!ws[key].s) ws[key].s = {};
    if (ws[key].s.protection) delete ws[key].s.protection;
  });

  XLSX.utils.book_append_sheet(wb, ws, "Orario");
  XLSX.writeFile(wb, nomeFile);

  mostraBanner();

  if (datiOrario[anno] && datiOrario[anno][mese]) {
    delete datiOrario[anno][mese];
    salvaDati();
    generaCalendario();
  }
}

/* ============================================================
   BANNER DI CONFERMA
============================================================ */

function mostraBanner() {
  const banner = document.getElementById("exportBanner");
  banner.classList.add("visible");

  setTimeout(() => {
    banner.classList.remove("visible");
  }, 2500);
}
</script>
